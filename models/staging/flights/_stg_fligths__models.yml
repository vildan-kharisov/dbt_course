version: 2

models:
  - name: stg_flights__seats
    tests:
    - dbt_utils.unique_combination_of_columns:
        combination_of_columns:
          - seat_no
          - aircraft_code
    columns:
      - name: seat_no
        data_tests:
          - not_null
          - seat_no_pattern:
              config:
                severity: warn
      - name: aircraft_code
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_flights__aircrafts')
              field: aircraft_code
      - name: fare_conditions
        data_tests:
          - not_null
          - accepted_values:
              values: ['Business', 'Comfort', 'Economy']
  - name: stg_flights__airports
    columns:
      - name: airport_code
        data_tests:
          - not_null
          - unique
      - name: airport_name
      - name: city
      - name: coordinates
      - name: timezone
# Покройте generic тестами модель stg_flights__airports:
# (1/3) Проверьте, что поле airport_code не содержит пустых значений (null) и не содержит дубликатов;
 